services:
  surrealdb-rocksdb:
    image: surrealdb/surrealdb:v3.2
    # See deploy/compose.yaml for why this runs as root.
    user: "0:0"
    command:
      - start
      - --user
      - root
      - --pass
      - root
      - --bind
      - 0.0.0.0:8000
      - rocksdb:/data/polymix.db
    ports:
      - "8001:8000"
    volumes:
      - surrealdb_rocksdb_data:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready", "--endpoint", "ws://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  surrealdb_rocksdb_data:
