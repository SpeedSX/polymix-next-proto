<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <filter id="iconShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="rgba(0,0,0,0.13)"/>
    </filter>
    <filter id="glowCyan">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="520" height="180" fill="#FFFFFF"/>

  <!-- ─── CMY ICON ─── -->
  <!-- Outer subtle ring for polish -->
  <circle cx="82" cy="85" r="68" fill="none" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Three overlapping circles — CMY colour model / print mixing -->
  <g filter="url(#iconShadow)">
    <g style="isolation: isolate">
      <!-- Cyan – top-left -->
      <circle cx="63"  cy="70" r="44" fill="#00B4D8" opacity="0.83" style="mix-blend-mode: multiply"/>
      <!-- Magenta – top-right -->
      <circle cx="105" cy="70" r="44" fill="#E91E8C" opacity="0.83" style="mix-blend-mode: multiply"/>
      <!-- Yellow – bottom-centre -->
      <circle cx="84"  cy="104" r="44" fill="#FFD600" opacity="0.83" style="mix-blend-mode: multiply"/>
    </g>
  </g>

  <!-- Small white centre dot — registration mark feel -->
  <circle cx="84" cy="86" r="5" fill="white" opacity="0.72"/>

  <!-- ─── SEPARATOR ─── -->
  <line x1="170" y1="32" x2="170" y2="148" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- ─── WORDMARK ─── -->
  <text
    x="190" y="102"
    font-family="'Helvetica Neue', HelveticaNeue, Helvetica, Arial, sans-serif"
    font-size="60"
    font-weight="800"
    letter-spacing="-1.5">
    <tspan fill="#0F172A">Poly</tspan><tspan fill="#0096C7">Mix</tspan>
  </text>

  <!-- ─── DESCRIPTOR ─── -->
  <text
    x="192" y="130"
    font-family="'Helvetica Neue', HelveticaNeue, Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#94A3B8"
    letter-spacing="3.8">PRINT ORDER MANAGEMENT</text>
</svg>
