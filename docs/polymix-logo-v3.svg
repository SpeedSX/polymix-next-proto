<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <filter id="docShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="rgba(15,23,42,0.12)"/>
    </filter>
  </defs>

  <rect width="480" height="160" fill="#FFFFFF"/>

  <!-- ─── ICON: stacked sheets, all bottom-aligned at y=116 ─── -->
  <!-- Heights decrease front-to-back so only tops/left sides peek out -->
  <g filter="url(#docShadow)">
    <!-- Back sheet — tallest, peeks furthest above front -->
    <rect x="10" y="45" width="56" height="71" rx="6" fill="#BAE6FD"/>
    <!-- Middle sheet -->
    <rect x="20" y="53" width="56" height="63" rx="6" fill="#38BDF8"/>
    <!-- Front sheet — on top, primary document -->
    <rect x="30" y="61" width="56" height="55" rx="6" fill="#0F172A"/>
  </g>

  <!-- Accent tag on front sheet -->
  <rect x="37" y="69" width="38" height="5.5" rx="2.75" fill="#0096C7"/>

  <!-- Content lines simulating print/text rows -->
  <rect x="37" y="82"  width="38" height="3.5" rx="1.75" fill="#FFFFFF" opacity="0.22"/>
  <rect x="37" y="91"  width="30" height="3.5" rx="1.75" fill="#FFFFFF" opacity="0.18"/>
  <rect x="37" y="100" width="34" height="3.5" rx="1.75" fill="#FFFFFF" opacity="0.13"/>

  <!-- ─── SEPARATOR ─── -->
  <line x1="105" y1="34" x2="105" y2="126" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- ─── WORDMARK ─── -->
  <text
    x="122" y="100"
    font-family="'Helvetica Neue', HelveticaNeue, Helvetica, Arial, sans-serif"
    font-size="60"
    font-weight="800"
    letter-spacing="-1.5">
    <tspan fill="#0F172A">Poly</tspan><tspan fill="#0096C7">Mix</tspan>
  </text>

  <!-- ─── DESCRIPTOR ─── -->
  <text
    x="124" y="124"
    font-family="'Helvetica Neue', HelveticaNeue, Helvetica, Arial, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#94A3B8"
    letter-spacing="3.6">PRINT ORDER MANAGEMENT</text>
</svg>
